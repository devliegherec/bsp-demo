[tool.poetry]
name = "tiro-bsp"
version = "1.0.0"
description = "Dashboard BSP demo day"
authors = ["Charlotte De Vlieghere <charlotte.devlieghere@tiro.health>"]
package-mode = false  

[tool.poetry.dependencies]
python = ">=3.10,<3.15" 
streamlit = "1.27.0"
pandas = "^1.2"
plotly = "5.18.0"

# File Support
openpyxl = "*"
xlrd = "^1.2.0"
xlsxwriter = "*"

# Utilities
pydantic = "*"
click = "^8"
tqdm = "*"
emoji = "*"
protobuf = "3.20.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
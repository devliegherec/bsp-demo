[tool.poetry]
name = "tiro-bsp"
version = "0.0.1"
description = "Dashboard BSP demo day"
authors = ["Charlotte De Vlieghere <charlotte.devlieghere@tiro.health>"]
readme = "README.md"
packages = []

[tool.poetry.dependencies]
python = ">=3.10,<3.13"
streamlit = "1.27.0"
pandas = "^1.2"
plotly = "5.18.0"

# File Support
openpyxl = "*"
xlrd = "^1.2.0"
xlsxwriter = "*"

# Utilities
pydantic = "*"
click = "^8"
tqdm = "*"
emoji = "*"
protobuf = "3.20.0"

[tool.poetry.group.dev.dependencies]
# Left empty for transitive dependencies to be handled by Poetry automatically

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"